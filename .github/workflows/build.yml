name: Build OmniChat APK

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci # "npm ci" est plus propre et rapide en CI que "npm install"

      - name: Prepare www folder
        run: |
          mkdir -p www
          # Assure-toi que ce fichier existe ou que ton build web est lancé ici
          cp src/index.html www/index.html 

      - name: Capacitor Sync
        run: |
          npx cap sync android

      - name: Copy app icons
        run: |
          # Création des dossiers et copie des icônes
          for d in ldpi mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${d}
            if [ -f "assets/icons/mipmap-${d}.png" ]; then
              cp assets/icons/mipmap-${d}.png android/app/src/main/res/mipmap-${d}/ic_launcher.png
              cp assets/icons/mipmap-${d}.png android/app/src/main/res/mipmap-${d}/ic_launcher_round.png
            fi
          done

      - name: Patch AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Vérifie bien le nom de la permission (ex: android.permission.READ_EXTERNAL_STORAGE)
          if ! grep -q "READ_CLIPBOARD" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.READ_CLIPBOARD"/>|' "$MANIFEST"
          fi

      - name: Patch MainActivity
        run: |
          # Correction de l'indentation ici
          MAIN=android/app/src/main/java/com/omnichat/app/MainActivity.java
          mkdir -p android/app/src/main/java/com/omnichat/app/
          cat > "$MAIN" << 'EOF'
          package com.omnichat.app;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
            }
          }
          EOF

      - name: Patch styles.xml
        run: |
          STYLES=android/app/src/main/res/values/styles.xml
          if [ -f "$STYLES" ]; then
            # Utilisation de sed pour insérer avant la fermeture de la balise style
            sed -i '/<\/style>/i \    <item name="android:statusBarColor">@android:color/transparent</item>' "$STYLES"
            sed -i '/<\/style>/i \    <item name="android:windowLightStatusBar">true</item>' "$STYLES"
          fi

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OmniChat-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
